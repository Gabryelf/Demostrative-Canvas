<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пример 001 — Прыгающий мяч | Canvas Playground</title>
    <link rel="stylesheet" href="styles/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏀 Прыгающий мяч</h1>
            <p>Пример с физикой отскока и гравитацией</p>
        </div>
        
        <div class="canvas-wrapper">
            <canvas id="demo" width="800" height="500"></canvas>
            <div class="controls">
                <button id="addBallBtn" class="btn btn-primary">➕ Добавить мяч</button>
                <button id="clearBtn" class="btn btn-secondary">🗑️ Очистить</button>
                <div class="stats">
                    <span>Мячей: <strong id="ballCount">1</strong></span>
                    <span>FPS: <strong id="fpsDisplay">60</strong></span>
                </div>
            </div>
        </div>

        <div class="info-bar">
            <span>🎯 Кликните по холсту, чтобы добавить мяч</span>
            <span>🔄 Нажмите Space для паузы</span>
        </div>

        <div class="actions">
            <a href="../../index.html" class="btn btn-back">← Назад к примерам</a>
            <a href="docs/index.html" class="btn btn-docs">📖 Документация</a>
            <a href="https://github.com/Gabryelf/Demostrative-Canvas/tree/main/examples/001-bouncing-ball" class="btn btn-code">💻 Код</a>
        </div>
    </div>

    <script src="src/ball.js"></script>
    <script src="src/main.js"></script>
</body>
</html>
